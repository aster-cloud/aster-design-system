# Glossary Contract — consumer registry.
# Plan: aster-cloud/.claude/plan/glossary-contract.md (v7) §10.2.1.
#
# Adding a new consumer = one PR editing this file + @aster/glossary-stewards
# approval. No code change to the matrix-generator script required.

version: 1
consumers:
  - org: aster-cloud
    repo: aster-cloud
    tier: official
    status: active
    glossary-config-path: glossary.config.yaml
    expected-surfaces: [messages, docs-onprem, docs-saas]

  - org: aster-cloud
    repo: aster-lang-dev
    tier: official
    status: active
    glossary-config-path: glossary.config.yaml
    expected-surfaces: [docs]

  - org: aster-cloud
    repo: aster-lang-core
    tier: official
    status: active
    glossary-config-path: glossary.config.yaml
    expected-surfaces: [overlays]

  # The per-language aster-lang-en / -zh / -de repos were retired and
  # consolidated into the canonical aster-lang-locales repo (ADR-0011).
  # They are removed rather than marked `status: retired` because the
  # consumer schema only permits `active | onboarding`
  # (packages/glossary/src/schema.ts). Leaving them would keep matrix /
  # parity generation pointed at three archived repos.
  - org: aster-cloud
    repo: aster-lang-locales
    tier: official
    status: active
    glossary-config-path: glossary.config.yaml
    expected-surfaces: [overlays, vocabularies]

  - org: aster-cloud
    repo: aster-lang-hi
    tier: official
    status: active
    glossary-config-path: glossary.config.yaml
    expected-surfaces: [overlays, vocabularies]
