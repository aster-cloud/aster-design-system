name: Publish design-system to npm

# Two triggers:
#   1. tag push matching v* → publish all packages at that version
#   2. manual workflow_dispatch → emergency republish without retagging
#
# Why tag-driven rather than push-to-main:
#   The design system advances at a different cadence than the consumer
#   apps. Explicit version bumps via tag let aster-cloud/aster-lang-dev
#   pin to known good versions, not "whatever was on main when CI ran".
#
# Auth: NPM_TOKEN secret with publish access to the @aster-cloud scope on
# https://registry.npmjs.org (the same org that already publishes
# @aster-cloud/aster-lang-ts).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager in root package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # Tell setup-node to write an ~/.npmrc pointing at the public
          # registry with NODE_AUTH_TOKEN as the auth source. pnpm picks
          # it up automatically.
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Publish tokens first because ui depends on it transitively.
      # `--no-git-checks` because tags are the canonical version source,
      # and pnpm otherwise wants a clean working tree we just dirtied
      # with the build output.
      #
      # We swallow "version already published" (E403) so tagging a UI-
      # only bump doesn't force a tokens version bump. Anything else
      # still fails the run.
      - name: Publish @aster-cloud/tokens
        working-directory: packages/tokens
        run: |
          set -o pipefail
          pnpm publish --no-git-checks --access=public 2>&1 | tee /tmp/tokens-publish.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q "previously published versions" /tmp/tokens-publish.log; then
              echo "tokens@$(jq -r .version package.json) already on registry — skipping"
              exit 0
            fi
            exit $status
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @aster-cloud/ui
        working-directory: packages/ui
        run: |
          set -o pipefail
          pnpm publish --no-git-checks --access=public 2>&1 | tee /tmp/ui-publish.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q "previously published versions" /tmp/ui-publish.log; then
              echo "ui@$(jq -r .version package.json) already on registry — skipping"
              exit 0
            fi
            exit $status
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
