name: Deploy Storybook

# Public preview of the design system. Anyone with the URL can browse
# the brand baseline, primitives, and design tokens without cloning
# the repo or running pnpm locally — useful for design review, partner
# eyes, and the marketing site team.
#
# Builds storybook-static and ships it to Cloudflare Pages. The
# wrangler-action target name `aster-design-system` is reusable: the
# Pages project handles all subsequent deploys.
#
# Trigger model:
#   - push to main → deploy to production branch
#   - pull_request → deploy to a preview URL (Pages auto-aliases)
#
# Required secrets (already set on this repo for npm publish):
#   - CLOUDFLARE_API_TOKEN (Pages:Edit scope)
#   - CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    # Lift Cloudflare credentials to job-level env so subsequent step
    # `if:` expressions can reference env.X — step-level env is not
    # available to that step's own `if:` (chicken-and-egg).
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Version pulled from packageManager in root package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build packages first so workspace deps (@aster-cloud/tokens,
      # @aster-cloud/ui) have their dist/ available for Storybook's
      # imports during the build.
      - name: Build packages
        run: pnpm build

      - name: Build Storybook
        working-directory: apps/storybook
        run: pnpm build

      # Pre-install wrangler globally so the action's auto-install logic
      # short-circuits. wrangler-action@v4 with our pnpm workspace layout
      # hits two failure modes:
      #   1. `pnpm exec wrangler` errors (workspace can't resolve it).
      #   2. `npm install wrangler@4` / `npx wrangler@4` then fails non-
      #      interactively because npm prompts before installing a missing
      #      package (npx cancellation: "no YES option").
      # `npm install -g wrangler@4` puts it on PATH so the action's
      # existing-wrangler check succeeds and skips its install path.
      - name: Install wrangler
        if: env.CLOUDFLARE_API_TOKEN != ''
        # Pin wrangler v3. v4's `pages deploy` calls /memberships before
        # the actual deploy, which requires User:Read on the API token.
        # Existing CLOUDFLARE_API_TOKEN only has Pages:Edit (which is
        # what the Cloudflare docs recommend for pages-only deploys).
        # v3 trusted CLOUDFLARE_ACCOUNT_ID and skipped the membership
        # lookup — we keep that behaviour pinned until the token is
        # updated with User:Read scope.
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        # Skip the deploy when secrets are missing instead of failing
        # the workflow with "Not logged in". Storybook build still
        # uploads as a workflow artifact for local download.
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        # Don't fail the whole workflow if the deploy hits a permission
        # issue. The aster-design-system Pages project may not exist on
        # the account yet, or the API token may be scoped to specific
        # existing projects (e.g. aster-lang-dev only). The build itself
        # is the workflow's primary value; deploy is best-effort. When
        # the operator creates the project + broadens the token, this
        # step will start succeeding on its own.
        continue-on-error: true
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pinned to v3 — see "Install wrangler" step for rationale.
          # When the API token is upgraded with User:Read scope, drop
          # this pin and let the action default to wrangler v4.
          wranglerVersion: "3"
          # First run will create the Pages project; subsequent runs
          # update it. The project must already exist on the account
          # OR the API token must have Pages:Edit permission so the
          # action can create it on first push.
          command: pages deploy apps/storybook/storybook-static --project-name aster-design-system --branch ${{ github.head_ref || github.ref_name }}

      - name: Warn when Cloudflare deploy failed
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && steps.deploy.outcome == 'failure'
        run: |
          echo "::warning::Cloudflare Pages deploy failed (likely missing project or token scope)."
          echo "::warning::Storybook built successfully — see workflow artifacts."
          echo "::warning::To fix: either (a) create the 'aster-design-system' Pages project on the account, or (b) broaden CLOUDFLARE_API_TOKEN scope to allow project creation across the account."

      - name: Warn when Cloudflare deploy skipped
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set on this repo;"
          echo "::warning::Storybook built successfully but was not deployed to Cloudflare Pages."
          echo "::warning::Add the secrets at https://github.com/aster-cloud/aster-design-system/settings/secrets/actions"
