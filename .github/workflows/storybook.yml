name: Deploy Storybook

# Public preview of the design system. Anyone with the URL can browse
# the brand baseline, primitives, and design tokens without cloning
# the repo or running pnpm locally — useful for design review, partner
# eyes, and the marketing site team.
#
# Builds storybook-static and ships it to Cloudflare Pages. The
# wrangler-action target name `aster-design-system` is reusable: the
# Pages project handles all subsequent deploys.
#
# Trigger model:
#   - push to main → deploy to production branch
#   - pull_request → deploy to a preview URL (Pages auto-aliases)
#
# Required secrets (already set on this repo for npm publish):
#   - CLOUDFLARE_API_TOKEN (Pages:Edit scope)
#   - CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # Version pulled from packageManager in root package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build packages first so workspace deps (@aster-cloud/tokens,
      # @aster-cloud/ui) have their dist/ available for Storybook's
      # imports during the build.
      - name: Build packages
        run: pnpm build

      - name: Build Storybook
        working-directory: apps/storybook
        run: pnpm build

      # Pre-install wrangler globally so the action's auto-install logic
      # short-circuits. wrangler-action@v4 with our pnpm workspace layout
      # hits two failure modes:
      #   1. `pnpm exec wrangler` errors (workspace can't resolve it).
      #   2. `npm install wrangler@4` / `npx wrangler@4` then fails non-
      #      interactively because npm prompts before installing a missing
      #      package (npx cancellation: "no YES option").
      # `npm install -g wrangler@4` puts it on PATH so the action's
      # existing-wrangler check succeeds and skips its install path.
      - name: Install wrangler
        if: env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Pages
        # The aster-design-system repo doesn't currently have Cloudflare
        # secrets configured (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID).
        # Skip the deploy when they're missing instead of failing the
        # workflow with "Not logged in" — Storybook build still gets
        # produced as a workflow artifact for local download.
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # First run will create the Pages project; subsequent runs
          # update it. The project must already exist on the account
          # OR the API token must have Pages:Edit permission so the
          # action can create it on first push.
          command: pages deploy apps/storybook/storybook-static --project-name aster-design-system --branch ${{ github.head_ref || github.ref_name }}

      - name: Note: Cloudflare deploy skipped (secrets not configured)
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set on this repo;"
          echo "::warning::Storybook built successfully but was not deployed to Cloudflare Pages."
          echo "::warning::Add the secrets at https://github.com/aster-cloud/aster-design-system/settings/secrets/actions"
